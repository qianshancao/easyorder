receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  otlp_http/victoriametrics:
    compression: gzip
    encoding: proto
    metrics_endpoint: "http://victoriametrics:8428/opentelemetry/v1/metrics"
  otlp_http/traces:
    encoding: proto
    traces_endpoint: "http://victoriatraces:9428/insert/opentelemetry/v1/traces"
  otlp_http/logs:
    encoding: proto
    logs_endpoint: "http://victorialogs:9429/insert/opentelemetry/v1/logs"

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http/victoriametrics]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http/traces]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http/logs]

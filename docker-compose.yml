services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: easyorder-otel
    command: ["--config", "/etc/otelcol/config.yml"]
    volumes:
      - ./otel-collector.yml:/etc/otelcol/config.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    depends_on:
      victoriametrics:
        condition: service_healthy
      victoriatraces:
        condition: service_healthy
      victorialogs:
        condition: service_healthy
    networks:
      - monitoring

  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: easyorder-vm
    ports:
      - "8428:8428"
    volumes:
      - vmdata:/storage
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=30d"
      - "--httpListenAddr=:8428"
      - "--opentelemetry.usePrometheusNaming"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8428/health"]
      start_period: 10s
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - monitoring

  victoriatraces:
    image: victoriametrics/victoria-traces:latest
    container_name: easyorder-vt
    ports:
      - "9428:9428"
    volumes:
      - vtdata:/storage
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=30d"
      - "--httpListenAddr=:9428"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9428/health"]
      start_period: 10s
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - monitoring

  victorialogs:
    image: victoriametrics/victoria-logs:latest
    container_name: easyorder-vl
    ports:
      - "9429:9429"
    volumes:
      - vldata:/storage
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=30d"
      - "--httpListenAddr=:9429"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9429/health"]
      start_period: 10s
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: easyorder-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_INSTALL_PLUGINS=victoriametrics-logs-datasource
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      victoriametrics:
        condition: service_healthy
      victoriatraces:
        condition: service_healthy
      victorialogs:
        condition: service_healthy
    networks:
      - monitoring

volumes:
  vmdata:
  vtdata:
  vldata:
  grafanadata:

networks:
  monitoring:
    driver: bridge

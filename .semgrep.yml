rules:
  # 外部规则集
  - p/python:
  - p/fastapi:
  - p/sqlalchemy:
  - p/security-audit:

  # SQLAlchemy 2.0：禁止使用 1.x 旧语法
  - id: sqlalchemy-no-declarative-base
    message: 使用 DeclarativeBase 替代 declarative_base()
    severity: ERROR
    languages: [python]
    pattern: declarative_base(...)

  - id: sqlalchemy-no-column
    message: 使用 Mapped + mapped_column() 替代 Column()
    severity: ERROR
    languages: [python]
    pattern: Column(...)

  - id: sqlalchemy-no-legacy-query
    message: 使用 select() 替代 session.query()
    severity: ERROR
    languages: [python]
    pattern: $SESSION.query(...)

  # 数据库兼容性：禁止原生 SQL，必须通过 SQLAlchemy ORM
  - id: no-raw-sql
    message: 禁止使用原生 SQL（text/execute），必须通过 SQLAlchemy ORM 操作
    severity: ERROR
    languages: [python]
    patterns:
      - pattern: text(...)
      - pattern: $SESSION.execute($SQL)
      - pattern: $SESSION.execute(text(...))

  # 数据库兼容性：String 类型必须指定长度（MySQL 要求）
  - id: string-must-have-length
    message: String 类型必须指定长度，确保 MySQL 兼容
    severity: WARNING
    languages: [python]
    pattern: String()

  - p/security-audit:
  - p/owasp-top-ten:

  # 架构约束：api 层禁止直接访问数据层
  - id: api-no-direct-data-access
    message: api 层禁止直接 import repositories 或 models，必须通过 service 层
    severity: ERROR
    languages: [python]
    paths:
      include:
        - "app/api/**"
    patterns:
      - pattern: import app.repositories
      - pattern: import app.models
      - pattern: from app.repositories import ...
      - pattern: from app.models import ...

  # 架构约束：services 层禁止访问 api 层
  - id: service-no-api-import
    message: service 层禁止 import api 层
    severity: ERROR
    languages: [python]
    paths:
      include:
        - "app/services/**"
    patterns:
      - pattern: import app.api
      - pattern: from app.api import ...

  # 架构约束：repositories 层禁止访问 services 或 api 层
  - id: repo-no-upper-layer-import
    message: repository 层禁止 import services 或 api 层
    severity: ERROR
    languages: [python]
    paths:
      include:
        - "app/repositories/**"
    patterns:
      - pattern: import app.services
      - pattern: import app.api
      - pattern: from app.services import ...
      - pattern: from app.api import ...

  # 依赖注入约束：api 层禁止直接实例化 service，必须通过 Depends() 注入
  - id: api-no-direct-service-instantiation
    message: api 层禁止直接实例化 service，必须通过 Depends() 依赖注入
    severity: ERROR
    languages: [python]
    paths:
      include:
        - "app/api/**"
    patterns:
      - pattern-inside: |
          from app.services import $SERVICE
      - pattern: $SERVICE(...)

  # 依赖注入约束：service 层禁止直接实例化 repository，必须通过构造函数注入
  - id: service-no-direct-repo-instantiation
    message: service 层禁止直接实例化 repository，必须通过构造函数依赖注入
    severity: ERROR
    languages: [python]
    paths:
      include:
        - "app/services/**"
    patterns:
      - pattern-inside: |
          from app.repositories import $REPO
      - pattern: $REPO(...)

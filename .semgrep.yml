rules:
  # SQLAlchemy 2.0：禁止使用 1.x 旧语法
  - id: sqlalchemy-no-declarative-base
    message: 使用 DeclarativeBase 替代 declarative_base()
    severity: ERROR
    languages: [python]
    pattern: declarative_base(...)

  - id: sqlalchemy-no-column
    message: 使用 Mapped + mapped_column() 替代 Column()
    severity: ERROR
    languages: [python]
    pattern: Column(...)

  - id: sqlalchemy-no-legacy-query
    message: 使用 select() 替代 session.query()
    severity: ERROR
    languages: [python]
    pattern: $SESSION.query(...)

  # 数据库兼容性：禁止原生 SQL
  - id: no-raw-sql
    message: 禁止使用原生 SQL（text()），必须通过 SQLAlchemy ORM 操作
    severity: ERROR
    languages: [python]
    pattern: text(...)

  # 数据库兼容性：String 类型必须指定长度（MySQL 要求）
  - id: string-must-have-length
    message: String 类型必须指定长度，确保 MySQL 兼容
    severity: WARNING
    languages: [python]
    pattern: String()

  # 金融安全：禁止 float 用于金额
  - id: no-float-for-money
    message: 金额字段必须使用 int（分），禁止使用 float，避免精度丢失
    severity: ERROR
    languages: [python]
    pattern-either:
      - pattern: "$X: Mapped[float] = mapped_column(...)"

  # API 契约：FastAPI 端点必须有 response_model
  - id: fastapi-endpoint-must-have-response-model
    message: FastAPI 端点必须声明 response_model，确保 API 契约受控
    severity: ERROR
    languages: [python]
    paths:
      include:
        - "/app/api/**"
    patterns:
      - pattern-inside: |
          @router.$METHOD(...)
          def $FUNC(...):
              ...
      - pattern-not-inside: |
          @router.$METHOD(..., response_model=...)
          def $FUNC(...):
              ...
      - pattern: |
          @router.$METHOD(...)
          def $FUNC(...):
              ...

  # 架构约束：api 层禁止直接访问数据层（排除 deps.py）
  - id: api-no-direct-data-access
    message: api 层禁止直接 import repositories 或 models，必须通过 service 层
    severity: ERROR
    languages: [python]
    paths:
      include:
        - "/app/api/**"
      exclude:
        - "/app/api/deps.py"
    pattern-either:
      - pattern: import app.repositories
      - pattern: import app.models
      - pattern: from app.repositories import $X
      - pattern: from app.models import $X

  # 架构约束：services 层禁止访问 api 层
  - id: service-no-api-import
    message: service 层禁止 import api 层
    severity: ERROR
    languages: [python]
    paths:
      include:
        - "/app/services/**"
    pattern-either:
      - pattern: import app.api
      - pattern: from app.api import $X

  # 架构约束：repositories 层禁止访问 services、api 或 schemas 层
  - id: repo-no-upper-layer-import
    message: repository 层禁止 import services、api 或 schemas 层
    severity: ERROR
    languages: [python]
    paths:
      include:
        - "/app/repositories/**"
    pattern-either:
      - pattern: import app.services
      - pattern: import app.api
      - pattern: import app.schemas
      - pattern: from app.services import $X
      - pattern: from app.api import $X
      - pattern: from app.schemas import $X

  # 架构约束：models 层禁止 import schemas 层
  - id: model-no-schema-import
    message: model 层禁止 import schemas 层，ORM 和 Pydantic 必须分离
    severity: ERROR
    languages: [python]
    paths:
      include:
        - "/app/models/**"
    pattern-either:
      - pattern: import app.schemas
      - pattern: from app.schemas import $X

  # 依赖注入约束：api 层禁止直接实例化 service，必须通过 Depends() 注入
  - id: api-no-direct-service-instantiation
    message: api 层禁止直接实例化 service，必须通过 Depends() 依赖注入
    severity: ERROR
    languages: [python]
    paths:
      include:
        - "/app/api/**"
      exclude:
        - "/app/api/deps.py"
    patterns:
      - pattern-inside: |
          from app.services import $SERVICE
      - pattern: $SERVICE(...)

  # 依赖注入约束：service 层禁止直接实例化 repository，必须通过构造函数注入
  - id: service-no-direct-repo-instantiation
    message: service 层禁止直接实例化 repository，必须通过构造函数依赖注入
    severity: ERROR
    languages: [python]
    paths:
      include:
        - "/app/services/**"
    patterns:
      - pattern-inside: |
          from app.repositories import $REPO
      - pattern: $REPO(...)
